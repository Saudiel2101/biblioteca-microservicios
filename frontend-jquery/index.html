<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Biblioteca Digital</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="css/estilos.css">
</head>

<body>

    <!-- Contenedor de Login (visible por defecto) -->
    <div id="loginContainer" class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card shadow">
                    <div class="card-body">
                        <h3 class="text-center">Iniciar Sesión</h3>
                        <hr>
                        <div id="loginError" class="alert alert-danger d-none">Credenciales inválidas</div>
                        <div class="mb-3">
                            <label>Usuario</label>
                            <input type="text" id="loginUsuario" class="form-control" placeholder="Usuario">
                        </div>
                        <div class="mb-3">
                            <label>Contraseña</label>
                            <input type="password" id="loginPassword" class="form-control" placeholder="Contraseña">
                        </div>
                        <button id="btnLogin" class="btn btn-primary w-100">Ingresar</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Contenido principal (oculto al inicio) -->
    <div id="appContainer" style="display:none;">
        <!-- Aquí va tu navbar -->
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
            <div class="container">
                <a class="navbar-brand" href="#">📚 Biblioteca Digital</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="menu">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item">
                            <a class="nav-link active" href="#" id="menuInicio">Inicio</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#" id="menuLibros">Libros</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#" id="menuAutores">Autores</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#" id="menuPrestamos">Préstamos</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>

        <div class="container mt-4">
            <div id="contenido"></div>
        </div>

        <!-- Modales (los que ya tienes) -->
        <!-- Modal Libro, Modal Autor, Modal Préstamo -->
        <!-- ... -->
    </div>

    <!-- Scripts (jQuery, Bootstrap, etc.) -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/libros.js"></script>
    <script src="js/autores.js"></script>
    <script src="js/prestamos.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
